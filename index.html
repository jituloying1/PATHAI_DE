<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Login System</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial;
  height: 100vh;
  overflow: hidden;
}

/* Background Video */
.video-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.video-container video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Form Styling */
.container {
  position: relative;
  z-index: 1;
  width: 90%;
  max-width: 500px;
  margin: auto;
  top: 50%;
  transform: translateY(-50%);
}

.form-box {
  background: rgba(255,255,255,0.85);
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

button {
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  border: none;
  background: #007bff;
  color: white;
  font-size: 16px;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}
</style>
</head>

<body>

<!-- Background Video -->
<div class="video-container">
  <video autoplay loop muted>
<source src="https://yourusername.github.io/yourrepo/InShot_20260330_171839501.mp4" type="video/mp4">
  </video>
</div>

<!-- Content -->
<div class="container">
  <div class="form-box">
    <h2>Registration</h2>

    <a href="https://jituloying1.github.io/PATHAIDEDRIVER/">
      <button>Driver Registration</button>
    </a>

    <a href="https://jituloying1.github.io/PATHAIDEVEHICLE/">
      <button>Vehicle Registration</button>
    </a>

    <a href="https://jituloying1.github.io/pathaideerikshaw/">
      <button>E-Rickshaw Registration</button>
    </a>

  </div>
</div>

</body>
</html>
